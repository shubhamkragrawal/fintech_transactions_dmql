name: 'fintech_dbt'
version: '1.0.0'
config-version: 2

profile: 'fintech_dbt'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  fintech_dbt:
    staging:
      +materialized: view
      +schema: staging
    marts:
      dimensions:
        +materialized: table
        +schema: analytics
      facts:
        +materialized: table
        +schema: analytics
